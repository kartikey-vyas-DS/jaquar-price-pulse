version: 2

models:
  - name: stg_watchlist
    description: Active SKUs selected for price monitoring.
    columns:
      - name: watch_id
        data_tests:
          - not_null
          - unique
      - name: product_code
        data_tests:
          - not_null
      - name: product_url
        data_tests:
          - not_null
      - name: alert_threshold_pct
        data_tests:
          - not_null

  - name: stg_price_snapshots
    description: Raw price observations by snapshot date.
    columns:
      - name: snapshot_date
        data_tests:
          - not_null
      - name: watch_id
        data_tests:
          - not_null
      - name: mrp
        data_tests:
          - not_null

  - name: price_history
    description: Historical price series with previous price and percentage movement.
    columns:
      - name: watch_id
        data_tests:
          - not_null
      - name: snapshot_date
        data_tests:
          - not_null
      - name: mrp
        data_tests:
          - not_null

  - name: price_change_alerts
    description: Products whose price change exceeded their configured threshold.
    columns:
      - name: watch_id
        data_tests:
          - not_null
      - name: pct_change_vs_previous_snapshot
        data_tests:
          - not_null
